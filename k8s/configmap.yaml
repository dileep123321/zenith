apiVersion: v1
kind: ConfigMap
metadata:
  name: zenith-config
  namespace: zenith
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGODB_URL: "mongodb://mongodb:27017/enterprise-saas"
  REDIS_URL: "redis://redis:6379"
  JWT_ACCESS_EXPIRATION_MINUTES: "30"
  JWT_REFRESH_EXPIRATION_DAYS: "30"
  NEXT_PUBLIC_API_URL: "http://backend:5000/v1" # This needs to be the external IP of the backend or updated in the frontend ingress
